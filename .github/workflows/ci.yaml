name: CI-CD

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Instalar dependências
        run: npm install

      - name: Deploy (fake)
        run: curl -X POST ${{RENDER_DEPLOY_HOOK}}

      - name: Gerar flag
        id: flag
        run: |
          echo "YSBhdWxh" > flag.txt

      - name: Expor resultado
        run: cat flag.txt
